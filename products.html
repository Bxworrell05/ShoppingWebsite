<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Men's Clothing Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our Products</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="featured">
            <h3>All Products</h3>
            <div class="grid">
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=400&q=60" alt="Jacket">
                    <p>Stylish Jacket - $89.99</p>
                    <button class="button" onclick="addToCart('Stylish Jacket', 89.99)">Add to Cart</button>
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=400&q=60" alt="Shirt">
                    <p>Casual Shirt - $39.99</p>
                    <button class="button" onclick="addToCart('Casual Shirt', 39.99)">Add to Cart</button>
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?auto=format&fit=crop&w=400&q=60" alt="Pants">
                    <p>Comfortable Pants - $59.99</p>
                    <button class="button" onclick="addToCart('Comfortable Pants', 59.99)">Add to Cart</button>
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1489980795214-0f3d5d188784?auto=format&fit=crop&w=400&q=60" alt="Shoes">
                    <p>Running Shoes - $79.99</p>
                    <button class="button" onclick="addToCart('Running Shoes', 79.99)">Add to Cart</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Men's Clothing Store</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
